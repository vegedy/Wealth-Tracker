<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  <!-- Line chart path in teal -->
  <polyline
    points="4,24 10,17 15,20 20,10 26,13"
    stroke="#2ab5a5"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Dots on the line -->
  <circle cx="4"  cy="24" r="1.5" fill="#2ab5a5"/>
  <circle cx="10" cy="17" r="1.5" fill="#2ab5a5"/>
  <circle cx="15" cy="20" r="1.5" fill="#2ab5a5"/>
  <circle cx="20" cy="10" r="1.5" fill="#2ab5a5"/>
  <circle cx="26" cy="13" r="1.5" fill="#2ab5a5"/>
</svg>
